<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Cyber Hub v4</title>
  <link rel="stylesheet" href="assets/style.css" />
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: rgba(8, 16, 24, 0.92);
      border: 1px solid rgba(0, 255, 170, 0.12);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 0 30px rgba(0, 255, 170, 0.08);
      backdrop-filter: blur(8px);
    }

    .auth-card h1 {
      margin-bottom: 10px;
      font-size: 32px;
    }

    .auth-card p {
      margin-bottom: 18px;
      color: #9fb3c8;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .auth-form input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(0, 255, 170, 0.15);
      background: rgba(255, 255, 255, 0.03);
      color: #fff;
      outline: none;
    }

    .auth-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 8px;
    }

    .auth-message {
      min-height: 24px;
      margin-top: 12px;
      color: #58f2b1;
      font-size: 14px;
    }

    .auth-back {
      display: inline-block;
      margin-top: 16px;
      color: #58f2b1;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>

  <section class="auth-page">
    <div class="auth-card">
      <h1>Cyber Hub Login</h1>
      <p>Signup or login to access your protected dashboard.</p>

      <div class="auth-form">
        <input type="email" id="email" placeholder="Enter your email" />
        <input type="password" id="password" placeholder="Enter your password" />

        <div class="auth-actions">
          <button class="btn btn-primary" onclick="signup()">Sign Up</button>
          <button class="btn btn-secondary" onclick="login()">Login</button>
        </div>

        <div id="authMessage" class="auth-message"></div>
      </div>

      <a class="auth-back" href="index.html">← Back to Home</a>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/auth.js"></script>
  <script>
    redirectIfLoggedIn();
  </script>
</body>
</html>
