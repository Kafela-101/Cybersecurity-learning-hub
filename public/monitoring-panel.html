<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Panel Premium</title>

<style>
:root{
  --bg:#030711;
  --bg2:#07111f;
  --panel:#0b1422;
  --line:rgba(151,170,255,.12);

  --text:#f5f7ff;
  --muted:#9fb0d0;

  --blue:#5b8cff;
  --violet:#8b5cf6;
  --cyan:#38bdf8;

  --green:#22c55e;
  --yellow:#facc15;
  --red:#ef4444;
}

/* BASE */
body{
  font-family: Arial, sans-serif;
  background:
    radial-gradient(circle at top left, rgba(56,189,248,.1), transparent 25%),
    radial-gradient(circle at top right, rgba(139,92,246,.1), transparent 25%),
    linear-gradient(var(--bg), var(--bg2));
  color:var(--text);
  margin:0;
}

/* CARD */
.card{
  background:rgba(255,255,255,.04);
  border:1px solid var(--line);
  border-radius:16px;
  padding:20px;
}

/* BUTTON */
.btn{
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.btn-primary{
  background:linear-gradient(135deg,var(--blue),var(--violet));
  color:white;
}

/* LOGIN */
#loginSection{
  max-width:400px;
  margin:80px auto;
}

input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid var(--line);
  background:#0b1422;
  color:white;
}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

/* STATS */
.stats{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.stat{
  flex:1;
  padding:15px;
  border-radius:12px;
  background:#0f1a2e;
}

.stat h3{
  margin:0;
  font-size:14px;
  color:var(--muted);
}

.stat p{
  margin:5px 0 0;
  font-size:22px;
  font-weight:bold;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

td, th{
  padding:10px;
  border-bottom:1px solid var(--line);
}

</style>
</head>

<body>

<div id="loginSection">
  <div class="card">
    <h2>Admin Login</h2>
    <input id="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Password">
    <button class="btn btn-primary" onclick="login()">Login</button>
  </div>
</div>

<div id="panel" style="display:none; padding:20px;">

<div class="topbar">
  <h2>Cyber Panel</h2>
  <button onclick="logout()">Logout</button>
</div>

<div class="stats">
  <div class="stat"><h3>Total</h3><p id="t">0</p></div>
  <div class="stat"><h3>Pending</h3><p id="p">0</p></div>
  <div class="stat"><h3>Review</h3><p id="r">0</p></div>
</div>

<div class="card">
  <h3>Add Report</h3>
  <input id="url" placeholder="URL">
  <input id="reason" placeholder="Reason">
  <button class="btn btn-primary" onclick="add()">Submit</button>
</div>

<div class="card" style="margin-top:20px;">
  <h3>Reports</h3>
  <table>
    <thead>
      <tr><th>URL</th><th>Status</th></tr>
    </thead>
    <tbody id="list"></tbody>
  </table>
</div>

</div>

<script>
let data=[];

function login(){
  document.getElementById("loginSection").style.display="none";
  document.getElementById("panel").style.display="block";
}

function logout(){
  location.reload();
}

function add(){
  let url=document.getElementById("url").value;
  let reason=document.getElementById("reason").value;

  data.push({url,reason,status:"Pending"});
  render();
}

function render(){
  let html="";
  let p=0;

  data.forEach(d=>{
    if(d.status==="Pending") p++;
    html+=`<tr><td>${d.url}</td><td>${d.status}</td></tr>`;
  });

  document.getElementById("list").innerHTML=html;
  document.getElementById("t").innerText=data.length;
  document.getElementById("p").innerText=p;
}
</script>

</body>
</html>
